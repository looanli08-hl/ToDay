name: ToDay
options:
  minimumXcodeGenVersion: 2.45.0
settings:
  base:
    PRODUCT_NAME: ToDay
    PRODUCT_BUNDLE_IDENTIFIER: com.looanli.today
    DEVELOPMENT_TEAM: G89F57S8M3
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: 5.0
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0.0"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: Unfold
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    TARGETED_DEVICE_FAMILY: 1
targets:
  ToDay:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ToDay
    entitlements:
      path: ToDay/ToDay.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.security.application-groups:
          - group.com.looanli.today
    info:
      path: ToDay/Info.plist
      properties:
        BGTaskSchedulerPermittedIdentifiers:
          - com.looanli.today.refresh
          - com.looanli.today.processing
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UIBackgroundModes: "fetch processing"
        DEVELOPMENT_ASSET_PATHS: "\"ToDay/Preview Content\""
        ENABLE_PREVIEWS: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.lifestyle
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Unfold reads your motion, heart rate and sleep data to generate your daily life timeline. All data is stored locally."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Unfold uses your location to record places you visit and build your daily life timeline. Without location access, the timeline cannot be generated."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Unfold reads photos taken today and matches them to events on your timeline. Photos are never uploaded."
        INFOPLIST_KEY_NSCameraUsageDescription: "Unfold uses the camera to capture photos and videos to quickly record moments. Media files are stored locally only."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Unfold uses the microphone to record voice memos, helping you capture ideas with minimal effort. Recordings are stored locally only."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Unfold uses speech recognition to transcribe your recordings into text for easy browsing on the timeline. Recognition happens on-device."
        ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "Unfold does not write any health data. This permission is only required to satisfy system requirements."
        INFOPLIST_KEY_NSMotionUsageDescription: "Unfold uses motion activity to detect whether you are walking, running, or commuting, making your daily timeline more accurate and complete."
        INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: "Unfold passively records your location visits throughout the day to build your life timeline automatically, even when the app is closed. Always authorization is required for background recording."
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
  ToDayTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ToDayTests
    settings:
      base:
        PRODUCT_NAME: ToDayTests
        PRODUCT_BUNDLE_IDENTIFIER: com.looanli.today.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ToDay
schemes:
  ToDay:
    build:
      targets:
        ToDay: all
    test:
      config: Debug
      targets:
        - ToDayTests
    run:
      config: Debug
    archive:
      config: Release
