name: ToDay
options:
  minimumXcodeGenVersion: 2.45.0
settings:
  base:
    PRODUCT_NAME: ToDay
    PRODUCT_BUNDLE_IDENTIFIER: com.looanli.today
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: 5.0
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: ToDay
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    TARGETED_DEVICE_FAMILY: 1
targets:
  ToDay:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ToDay
    entitlements:
      path: ToDay/ToDay.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.weatherkit: true
        com.apple.security.application-groups:
          - group.com.looanli.today
    dependencies:
      - target: ToDayWatch
        embed: true
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_ASSET_PATHS: "\"ToDay/Preview Content\""
        ENABLE_PREVIEWS: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.lifestyle
        INFOPLIST_KEY_NSHealthShareUsageDescription: ToDay 读取你的运动、心率和睡眠数据，用来生成每日生活画卷。所有数据仅存储在本地。
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: ToDay 记录你到访过的地点，让画卷上的事件有地理上下文。位置数据仅存储在本地。
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: ToDay 读取你当天拍摄的照片，将它们匹配到画卷中对应的事件。照片不会上传。
  ToDayWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: ToDayWatch
        excludes:
          - Complication/**
      - path: ToDay/Shared
      - path: ToDay/Data/HealthKitEventInferenceEngine.swift
    info:
      path: ToDayWatch/Info.plist
      properties:
        CFBundleDisplayName: ToDay Watch
        NSHealthShareUsageDescription: ToDay 读取手表上的运动、心率和睡眠数据，用来补全每日生活画卷。所有数据仅存储在本地。
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.looanli.today
    entitlements:
      path: ToDayWatch/ToDayWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.security.application-groups:
          - group.com.looanli.today
    dependencies:
      - target: ToDayWatchWidgets
        embed: true
    settings:
      base:
        PRODUCT_NAME: ToDayWatch
        PRODUCT_BUNDLE_IDENTIFIER: com.looanli.today.watchkitapp
        TARGETED_DEVICE_FAMILY: 4
  ToDayWatchWidgets:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: ToDayWatch/Complication
      - path: ToDay/Shared
    info:
      path: ToDayWatch/Complication/Info.plist
      properties:
        CFBundleDisplayName: ToDay Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: ToDayWatch/Complication/ToDayWatchWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.looanli.today
    settings:
      base:
        PRODUCT_NAME: ToDayWatchWidgets
        PRODUCT_BUNDLE_IDENTIFIER: com.looanli.today.watchkitapp.widgets
        TARGETED_DEVICE_FAMILY: 4
        SKIP_INSTALL: YES
  ToDayTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ToDayTests
    settings:
      base:
        PRODUCT_NAME: ToDayTests
        PRODUCT_BUNDLE_IDENTIFIER: com.looanli.today.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ToDay
schemes:
  ToDay:
    build:
      targets:
        ToDay: all
        ToDayWatch: all
        ToDayWatchWidgets: all
    test:
      config: Debug
      targets:
        - ToDayTests
    run:
      config: Debug
    archive:
      config: Release
  ToDayWatch:
    build:
      targets:
        ToDayWatch: all
        ToDayWatchWidgets: all
    run:
      config: Debug
    archive:
      config: Release
