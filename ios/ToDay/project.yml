name: ToDay
options:
  minimumXcodeGenVersion: 2.45.0
settings:
  base:
    PRODUCT_NAME: ToDay
    PRODUCT_BUNDLE_IDENTIFIER: com.looanli.today
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: 5.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: ToDay
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.lifestyle
    INFOPLIST_KEY_NSHealthShareUsageDescription: ToDay reads your health data to build a private daily timeline.
    INFOPLIST_KEY_NSHealthUpdateUsageDescription: ToDay may save user-confirmed sessions in the future.
    INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: ToDay 使用位置信息来记录你去过的地方
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: ToDay 需要读取你的照片，以便把生活片段附在对应记录里。
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    TARGETED_DEVICE_FAMILY: 1
targets:
  ToDay:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ToDay
    entitlements:
      path: ToDay/ToDay.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.weatherkit: true
    dependencies:
      - target: ToDayWatch
        embed: true
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_ASSET_PATHS: "\"ToDay/Preview Content\""
        ENABLE_PREVIEWS: YES
  ToDayWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: ToDayWatch
      - path: ToDay/Shared
    settings:
      base:
        PRODUCT_NAME: ToDayWatch
        PRODUCT_BUNDLE_IDENTIFIER: com.looanli.today.watchkitapp
        TARGETED_DEVICE_FAMILY: 4
        INFOPLIST_KEY_CFBundleDisplayName: ToDay Watch
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.looanli.today
  ToDayTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ToDayTests
    settings:
      base:
        PRODUCT_NAME: ToDayTests
        PRODUCT_BUNDLE_IDENTIFIER: com.looanli.today.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ToDay
schemes:
  ToDay:
    build:
      targets:
        ToDay: all
        ToDayWatch: all
    test:
      config: Debug
      targets:
        - ToDayTests
    run:
      config: Debug
    archive:
      config: Release
  ToDayWatch:
    build:
      targets:
        ToDayWatch: all
    run:
      config: Debug
    archive:
      config: Release
