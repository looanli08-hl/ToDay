name: ToDay
options:
  minimumXcodeGenVersion: 2.45.0
settings:
  base:
    PRODUCT_NAME: ToDay
    PRODUCT_BUNDLE_IDENTIFIER: com.looanli.today
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: 5.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: ToDay
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.lifestyle
    INFOPLIST_KEY_NSHealthShareUsageDescription: ToDay reads your health data to build a private daily timeline.
    INFOPLIST_KEY_NSHealthUpdateUsageDescription: ToDay may save user-confirmed sessions in the future.
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    TARGETED_DEVICE_FAMILY: 1
targets:
  ToDay:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ToDay
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: ToDay/ToDay.entitlements
        DEVELOPMENT_ASSET_PATHS: "\"ToDay/Preview Content\""
        ENABLE_PREVIEWS: YES
schemes:
  ToDay:
    build:
      targets:
        ToDay: all
    run:
      config: Debug
    archive:
      config: Release
