<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attune</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- Header -->
  <div class="header">
    <span class="logo">Attune<span class="logo-dot">.</span></span>
    <button class="quiet-btn" id="quietToggle" title="Toggle quiet mode">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
      </svg>
    </button>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab active" data-tab="echo">Echo</button>
    <button class="tab" data-tab="timeline">Timeline</button>
  </div>

  <!-- Context Bar (hidden by default) -->
  <div class="context-bar hidden" id="contextBar">
    <span class="context-icon">&#9679;</span>
    <span class="context-text" id="contextText"></span>
  </div>

  <!-- Echo Tab -->
  <div class="tab-content" id="echoTab">
    <!-- Setup Screen -->
    <div class="setup-screen" id="setupScreen">
      <div class="setup-inner">
        <h2 class="setup-title">Connect to Attune</h2>
        <p class="setup-desc">Enter your sync token to get started with Echo.</p>
        <div class="setup-field">
          <label for="setupToken">Sync Token</label>
          <input type="text" id="setupToken" placeholder="Paste your sync token" />
        </div>
        <div class="setup-field">
          <label for="setupApiBase">API Server</label>
          <input type="text" id="setupApiBase" placeholder="https://daycho.com" />
        </div>
        <button class="connect-btn" id="connectBtn">Connect</button>
      </div>
    </div>

    <!-- Chat Screen -->
    <div class="chat-screen hidden" id="chatScreen">
      <div class="messages" id="messages"></div>
      <div class="typing-indicator hidden" id="typingIndicator">
        <div class="typing-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Timeline Tab -->
  <div class="tab-content hidden" id="timelineTab">
    <div class="timeline-list" id="timelineList"></div>
  </div>

  <!-- Input Bar -->
  <div class="input-bar hidden" id="inputBar">
    <textarea id="chatInput" placeholder="Talk to Echo..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
